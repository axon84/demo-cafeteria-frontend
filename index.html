            --chat--toggle--background: #6b3f27;

	<script type="module">
		import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

		// Sesión nueva en cada carga de página, sin importar lo que haya en localStorage.
		// Verificado contra el código fuente real del bundle: si se pasa `sessionId`
		// explícito, el widget lo usa siempre (y sobreescribe con este valor la key
		// "n8n-chat/sessionId" en localStorage); si no se pasa, con loadPreviousSession
		// en false igual genera uno propio, pero pasarlo explícito nos da control directo.
		const sessionId = crypto.randomUUID();

		createChat({
			webhookUrl: 'https://n8n-n8n.9es8ei.easypanel.host/webhook/69591039-505a-47e1-9c93-6c61f78cdb08/chat',
			mode: 'fullscreen',
			sessionId,
			loadPreviousSession: false,
			showWelcomeScreen: false,
			initialMessages: [
    '¡Hola! ☕ Un placer poder atenderle, somos la cafetería Demo ¿con quién tengo el gusto?'
],
			defaultLanguage: 'en',
			i18n: {
				en: {
					title: 'Demo Cafetería',
					subtitle: 'Bot de práctica — menú, horarios y pedidos',
					inputPlaceholder: 'Escribí tu mensaje...',
					footer: '',
					getStarted: 'Nueva conversación',
				},
			},
		});
